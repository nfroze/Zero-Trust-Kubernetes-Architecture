###############################################################################
# Orders Service Network Policy
#
# NIST SP 800-207, Tenet 6: "All resource authentication and authorization
# are dynamic and strictly enforced before access is allowed."
#
# The orders service handles order data. It:
#   - Accepts ingress ONLY from api-gateway on GET /orders and GET /health
#   - Makes egress requests ONLY to the database service in the data namespace
#   - Database access is restricted to GET /query?table=orders (read) and
#     POST /mutate (write) — the orders service cannot query the users table
#
# This is a key zero trust demonstration: the orders service has database
# access but it is scoped to specific HTTP methods and paths. A compromised
# orders pod cannot read user credentials from the database.
###############################################################################
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: orders-policy
  namespace: backend
spec:
  description: "Orders: ingress from api-gateway only, egress to database with table-scoped L7 rules"
  endpointSelector:
    matchLabels:
      app: orders
  ingress:
    - fromEndpoints:
        - matchLabels:
            app: api-gateway
      toPorts:
        - ports:
            - port: "3000"
              protocol: TCP
          rules:
            http:
              - method: GET
                path: "/orders"
              - method: POST
                path: "/orders"
              - method: GET
                path: "/health"
  egress:
    - toEndpoints:
        - matchLabels:
            k8s:io.kubernetes.pod.namespace: data
            app: database
      toPorts:
        - ports:
            - port: "3000"
              protocol: TCP
          rules:
            http:
              - method: GET
                path: "/query\\?table=orders"
              - method: POST
                path: "/mutate"
              - method: GET
                path: "/health"
